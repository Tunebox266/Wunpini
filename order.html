<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order — Wunpini Kitchen</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#1B120C;color:#F2E8D8;font-family:Inter,system-ui,Arial;margin:0;padding:0} .glass{background:rgba(242,232,216,0.03);border:1px solid rgba(242,232,216,0.06);backdrop-filter:blur(6px);border-radius:10px}</style>
  <!--
    Configuration options (choose one):
    1) Set keys in the browser console before loading this page:
         window.SUPABASE_URL = 'https://your-project.supabase.co'
         window.SUPABASE_ANON_KEY = 'public-anon-key'

    2) Or pass keys via URL query for quick testing (not recommended in production):
         /order.html?supabase_url=https://your-project.supabase.co&anon_key=PUBLIC_ANON_KEY

    DO NOT use the service_role key in this frontend.
  -->
  <script>
    // If URL contains keys (for quick testing), apply them to window globals
    (function(){
      const params = new URLSearchParams(location.search);
      const url = params.get('supabase_url');
      const anon = params.get('anon_key');
      if(url) window.SUPABASE_URL = url;
      if(anon) window.SUPABASE_ANON_KEY = anon;

      // Expose a small status element to the page (used later)
      window.__WUNPINI_ORDER_CONFIGURED = Boolean(window.SUPABASE_URL && window.SUPABASE_ANON_KEY);
    })();
  </script>
</head>
<body class="p-6">
  <main class="max-w-4xl mx-auto">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">Place an order — Wunpini Kitchen</h1>
      <div class="flex items-center gap-4">
        <a href="/" class="text-sm text-yellow-300">Back to site</a>
        <div id="supabase-status" class="text-xs opacity-70">Connecting…</div>
      </div>
    </header>

    <section class="grid md:grid-cols-2 gap-6">
      <div class="glass p-4">
        <h2 class="text-lg font-medium mb-3">Menu</h2>
        <div id="menu-list" class="space-y-3 text-sm">
          <p class="opacity-60">Loading menu…</p>
        </div>
      </div>

      <div class="glass p-4">
        <h2 class="text-lg font-medium mb-3">Your cart</h2>
        <div id="cart-list" class="space-y-2 text-sm mb-4">
          <p class="opacity-60">No items yet</p>
        </div>

        <div class="mb-4">
          <div class="mb-2 text-xs opacity-70">Customer details</div>
          <input id="cust-name" placeholder="Full name" class="w-full mb-2 p-2 rounded bg-transparent border border-gray-700 text-sm">
          <input id="cust-phone" placeholder="Phone" class="w-full mb-2 p-2 rounded bg-transparent border border-gray-700 text-sm">
          <input id="cust-address" placeholder="Address / Pickup notes" class="w-full mb-2 p-2 rounded bg-transparent border border-gray-700 text-sm">
          <textarea id="cust-notes" rows="3" placeholder="Notes (optional)" class="w-full mb-2 p-2 rounded bg-transparent border border-gray-700 text-sm"></textarea>
        </div>

        <div class="flex items-center justify-between mb-3">
          <div class="text-sm">Total</div>
          <div id="cart-total" class="font-mono text-lg text-yellow-300">GH₵0.00</div>
        </div>

        <button id="place-order" class="w-full px-4 py-3 rounded bg-red-600 text-white">Place order</button>
        <p id="order-msg" class="text-sm mt-3 opacity-80"></p>
      </div>
    </section>

    <section class="mt-8 text-xs opacity-70">
      <p>Delivery days: Wednesday, Saturday &amp; Sunday. Pickup available any day during business hours.</p>
      <p class="mt-2">At Your ServiceAlways</p>
    </section>
  </main>

  <script>
    // Update status UI based on whether keys are present
    (function(){
      const statusEl = document.getElementById('supabase-status');
      function update(){
        const ok = Boolean(window.SUPABASE_URL && window.SUPABASE_ANON_KEY);
        statusEl.textContent = ok ? 'Connected to backend' : 'Supabase not configured';
        statusEl.style.color = ok ? '#D9A441' : '#E2E8F0';
      }
      update();
      // If user sets keys in console afterwards, update the status when page regains focus
      window.addEventListener('focus', update);
    })();
  </script>

  <script src="/assets/order.js"></script>
</body>
</html>
